<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWell — Destinations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/shell.css">
<link rel="stylesheet" href="styles/journey.css">
<style>
  .dx-intro { padding: 48px 0 28px; }
  .dx-intro .eyebrow { display:block; margin-bottom: 12px; }
  .dx-intro h1 { font-size: clamp(34px,5vw,54px); line-height: 1.04; letter-spacing: -.015em; }
  .dx-intro .lead { color: var(--muted-foreground); margin-top: 14px; font-size: 18px; max-width: 56ch; }
  .dx-region-strip { display:flex; gap:8px; flex-wrap:wrap; margin-top: 22px; }
  .dx-region-chip { border:1px solid var(--border); background:var(--card); border-radius: var(--radius-pill); padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-sans); color:var(--foreground); }
  .dx-region-chip[aria-pressed="true"] { background:var(--foreground); color:var(--background); border-color:var(--foreground); }

  .dx-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 12px; }
  .dx-card { position:relative; border-radius: var(--radius-lg); overflow:hidden; aspect-ratio: 4/5; display:block; border:1px solid var(--border); cursor:pointer; transition: transform .25s cubic-bezier(.2,.7,.3,1), box-shadow .25s; }
  .dx-card:hover { transform: translateY(-4px); box-shadow: var(--e2); }
  .dx-card img { width:100%; height:100%; object-fit:cover; transition: transform .5s cubic-bezier(.2,.7,.3,1); }
  .dx-card:hover img { transform: scale(1.05); }
  .dx-card__scrim { position:absolute; inset:0; background: linear-gradient(180deg, rgba(15,22,20,.08), rgba(15,22,20,.82)); }
  .dx-card__badge { position:absolute; top:12px; inset-inline-end:12px; }
  .dx-card__body { position:absolute; inset-inline:0; bottom:0; padding:18px; color:#fff; }
  .dx-card__country { font-size:11px; letter-spacing:.08em; text-transform:uppercase; opacity:.85; font-weight:600; }
  .dx-card__name { font-family:var(--font-display); font-weight:600; font-size:22px; line-height:1.08; margin-top:3px; }
  .dx-card__line { font-size:13px; color:rgba(255,255,255,.85); margin-top:4px; }
  .dx-card--stub img { filter: saturate(.35); }

  @media (max-width: 900px) { .dx-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 560px) { .dx-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<div class="jn-subhead">
  <div class="jn-subhead__inner">
    <nav class="jn-crumbs" aria-label="Breadcrumb">
      <a href="Home.html">Home</a><span class="sep">/</span>
      <a href="regions.html">Regions</a><span class="sep">/</span>
      <span class="here" id="crumb">Destinations</span>
    </nav>
  </div>
</div>

<main id="main">
  <div class="container">
    <div class="dx-intro">
      <span class="eyebrow">Destinations</span>
      <h1 id="dx-title">Places worth the journey.</h1>
      <p class="lead" id="dx-lead">Every destination sits inside its region — so you can browse without losing your place in the trip you're building.</p>
      <div class="dx-region-strip" id="dx-region-strip"></div>
    </div>
    <div class="dx-grid" id="dx-grid"></div>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/places.js"></script>
<script src="js/images.js"></script>
<script src="js/shell.js"></script>
<script>
TWW.mountShell({ active: "destinations" });
const $ = (s,r=document)=>r.querySelector(s);
const ICON = TWW.ICON;
const qs = new URLSearchParams(location.search);
let activeRegion = qs.get("r") || "all";

function allDests() {
  const out = [];
  Object.entries(TWW.DESTINATIONS).forEach(([code,list])=>{ list.forEach(d=>out.push({...d, region:code})); });
  return out;
}
function regionsWithDests() { return TWW.REGIONS.filter(r=>TWW.DESTINATIONS[r.code]); }

function renderStrip() {
  $("#dx-region-strip").innerHTML =
    `<button class="dx-region-chip" data-region="all" aria-pressed="${activeRegion==='all'}">All regions</button>` +
    regionsWithDests().map(r=>`<button class="dx-region-chip" data-region="${r.code}" aria-pressed="${activeRegion===r.code}">${r.name}</button>`).join("");
}
function renderGrid() {
  const list = activeRegion==="all" ? allDests() : (TWW.DESTINATIONS[activeRegion]||[]).map(d=>({...d,region:activeRegion}));
  const R = TWW.REGIONS.find(r=>r.code===activeRegion);
  $("#crumb").textContent = R ? R.name + " · Destinations" : "Destinations";
  $("#dx-title").textContent = R ? `Destinations in ${R.name}` : "Places worth the journey.";
  $("#dx-grid").innerHTML = list.map(d=>`<a class="dx-card ${d.status==='stub'?'dx-card--stub':''}" href="destination-detail.html?d=${d.id}&r=${d.region}">
    <img src="${TWW.img(d.img,700)}" alt="" loading="lazy" referrerpolicy="no-referrer">
    <span class="dx-card__scrim"></span>
    <span class="dx-card__badge">${d.status==='live'?`<span class="pill pill-live" style="background:rgba(255,255,255,.92)">Live</span>`:`<span class="pill pill-preview" style="background:rgba(255,255,255,.86)">Preview</span>`}</span>
    <span class="dx-card__body"><span class="dx-card__country">${d.country}</span><span class="dx-card__name">${d.name}</span><span class="dx-card__line">${d.line}</span></span>
  </a>`).join("");
}
function render(){ renderStrip(); renderGrid(); }
document.addEventListener("click",(e)=>{
  const c = e.target.closest("[data-region]");
  if (c) { activeRegion = c.dataset.region; render(); window.scrollTo({top:0,behavior:'smooth'}); }
});
render();
</script>
</body>
</html>
