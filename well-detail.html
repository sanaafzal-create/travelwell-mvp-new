<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWell — Well</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/shell.css">
<link rel="stylesheet" href="styles/journey.css">
<link rel="stylesheet" href="styles/wells.css">
<style>
  .wd-hero { background: var(--dark-band); color:#fff; padding: 52px 0 44px; position:relative; overflow:hidden; }
  .wd-hero::before { content:""; position:absolute; inset:0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0); background-size: 22px 22px; }
  .wd-hero__inner { position:relative; max-width: var(--content-max); margin-inline:auto; padding-inline: var(--gutter); display:flex; gap:22px; align-items:flex-start; }
  .wd-hero__ic { width:72px; height:72px; border-radius:18px; background: rgba(255,255,255,.12); color:#fff; display:grid; place-items:center; flex:none; }
  .wd-hero__ic svg { width:36px; height:36px; }
  .wd-hero__body { color:rgba(255,255,255,.85); font-size:13px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; }
  .wd-hero h1 { color:#fff; font-size: clamp(34px,5vw,52px); line-height:1.04; margin-top:4px; }
  .wd-hero__tag { color:var(--dark-band-muted); font-size:18px; margin-top:8px; }
  .wd-hero__purpose { color:rgba(255,255,255,.9); font-size:16px; line-height:1.6; margin-top:16px; max-width:62ch; }

  .wd-body { max-width: var(--content-max); margin-inline:auto; padding: 36px var(--gutter) 0; }
  .wd-cats { display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 8px; }
  .wd-cat { font-size:13px; font-weight:600; color:var(--secondary-foreground); background:var(--secondary); border-radius:var(--radius-pill); padding:7px 14px; }

  .wd-use { display:flex; gap:10px; align-items:flex-start; background:var(--surface-alt); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:var(--radius-sm); padding:14px 16px; margin-top:18px; font-size:13.5px; color:var(--muted-foreground); line-height:1.5; max-width: 70ch; }
  .wd-use svg { flex:none; color:var(--gold-deep); margin-top:1px; }

  .wd-section-label { display:flex; align-items:center; gap:10px; margin: 40px 0 18px; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-foreground); font-weight:700; }
  .wd-section-label::after { content:""; flex:1; height:1px; background:var(--border); }

  .wd-empty { text-align:center; padding:60px 20px; max-width:520px; margin-inline:auto; }
  .wd-empty__ic { width:72px; height:72px; border-radius:50%; background:var(--surface-alt); color:var(--muted-foreground); display:grid; place-items:center; margin:0 auto 20px; }
  .wd-empty h3 { font-size:24px; } .wd-empty p { color:var(--muted-foreground); margin-top:10px; font-size:15px; line-height:1.55; }

  @media (max-width:760px){ .pv-grid{grid-template-columns:1fr;} .wd-hero__inner{flex-direction:column;} }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<div class="jn-subhead">
  <div class="jn-subhead__inner">
    <nav class="jn-crumbs" aria-label="Breadcrumb">
      <a href="Home.html">Home</a><span class="sep">/</span>
      <a href="wells.html">The Wells</a><span class="sep">/</span>
      <span class="here" id="crumb">Well</span>
    </nav>
    <a class="btn btn-ghost" href="providers.html">Browse all providers →</a>
  </div>
</div>

<main id="main"><div id="wd-root"></div></main>

<script src="js/data.js"></script>
<script src="js/places.js"></script>
<script src="js/images.js"></script>
<script src="js/shell.js"></script>
<script>
TWW.mountShell({ active: "wells" });
const $ = (s,r=document)=>r.querySelector(s);
const ICON = TWW.ICON;
const qs = new URLSearchParams(location.search);
const allWells = {}; [...TWW.WELLS,...TWW.LUX_WELLS].forEach(w=>allWells[w.id]=w);
const W = allWells[qs.get("w")] || allWells.stay;
const DET = TWW.WELL_DETAIL[W.id] || {};
const TIER = { prime:"★ Prime", vetted:"Vetted", prospective:"Prospective" };
const PRICE_LABEL = { value:"Value", comfort:"Comfort", premium:"Premium", ultra:"Ultra" };
const PRICE_DOT = { value:"#3F7E55", comfort:"#2C6E68", premium:"#C2A35B", ultra:"#A8873F" };
const MODE = { api:"Book in TravelWell", widget:"Book in TravelWell", affiliate:"Opens partner site" };

$("#crumb").textContent = W.name;
document.title = "TravelWell — " + W.name;

function providerCard(pv) {
  return `<article class="pv" data-pv="${pv.name}">
    <div class="pv__body">
      <div class="pv__top"><h3 class="pv__name">${pv.name}</h3><span class="pv__tier pv__tier--${pv.tier}">${TIER[pv.tier]}</span></div>
      <p class="pv__desc">${pv.desc}</p>
      <div class="pv__attrs">
        <span class="pv__attr"><span class="dot" style="background:${PRICE_DOT[pv.price]}"></span>${PRICE_LABEL[pv.price]}</span>
        <span class="pv__attr">${ICON(W.icon,'ic-sm')} ${W.name.replace('-Well','')}</span>
      </div>
    </div>
    <div class="pv__foot">
      <div class="pv__cta-row"><button class="btn btn-primary" data-book="${pv.name}">Book It</button><span class="pv__mode">${ICON(pv.mode==='affiliate'?'arrow':'check','ic-sm')} ${MODE[pv.mode]}</span></div>
      ${pv.mode==='affiliate'?`<p class="pv__ftc">${ICON("info","ic-sm")} <span>${pv.commission}. We may earn a commission if you book through this link — at no extra cost to you.</span></p>`:``}
    </div>
  </article>`;
}

function render() {
  const soon = W.status==="soon";
  const providers = (TWW.PROVIDERS[W.id]||[]);
  const hero = `<section class="wd-hero"><div class="wd-hero__inner">
    <div class="wd-hero__ic">${ICON(W.icon)}</div>
    <div>
      <div class="wd-hero__body">${W.body} · ${soon?'Pre-launch':'Live Well'}</div>
      <h1>${W.name}</h1>
      <div class="wd-hero__tag">${W.tag}</div>
      <p class="wd-hero__purpose">${DET.purpose||''}</p>
    </div>
  </div></section>`;

  const body = `<div class="wd-body">
    <div class="wd-section-label" style="margin-top:28px">Service categories</div>
    <div class="wd-cats">${(DET.cats||[]).map(c=>`<span class="wd-cat">${c}</span>`).join("")}</div>
    <div class="wd-use">${ICON("info","ic-sm")} <span><b style="color:var(--foreground)">How this Well earns:</b> ${DET.use||'Disclosure shown per provider.'} Every monetized link carries an FTC disclosure, shown right next to the action.</span></div>

    ${soon ? `<div class="wd-empty">
        <div class="wd-empty__ic">${ICON(W.icon)}</div>
        <h3>${W.name} switches on at launch</h3>
        <p>We're vetting partners now. ${W.name} will be fully bookable when we go live — it's part of the complete ecosystem from day one of public launch.</p>
        <span class="pill pill-soon" style="margin-top:18px">Activated at Launch</span>
      </div>`
    : `<div class="wd-section-label">Vetted providers · Prime first</div>
       <div class="pv-grid">${providers.map(providerCard).join("")}</div>
       <div style="margin-top:28px"><a class="btn btn-secondary" href="providers.html?well=${W.id}">See all ${W.name} providers →</a></div>`}
  </div><div style="height:80px"></div>`;

  $("#wd-root").innerHTML = hero + body;
}

document.addEventListener("click",(e)=>{
  const book = e.target.closest("[data-book]");
  if (book) { if(TWW.addToTrip) TWW.addToTrip({well:W.id,icon:W.icon,name:book.dataset.book,meta:W.name,status:"idea"}); else TWW.toast("Added"); }
});
render();
</script>
</body>
</html>
